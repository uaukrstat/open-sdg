<div class="zip-download-container">
    <a href="{{ page.remote_data_prefix }}/zip/{{ site.data.zip.filename }}"
       role="button"
       class="btn btn-primary btn-download" aria-describedby="zip-download-info">
        {{ page.t.frontpage.download_all }}
    </a>
    <div id="zip-download-info">
        {{ page.t.frontpage.zip_file }} - {{ site.data.zip.size_human }}
        {% if site.data.zip.timestamp %}
        <br>
        {{ page.t.metadata_fields.national_data_update_url }}:
        <span id="zip-date" data-timestamp="{{ site.data.zip.timestamp | date_to_xmlschema }}">
                {{ site.data.zip.timestamp | t_date: 'standard' }}
            </span>
        {% endif %}
    </div>
</div>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    let dateEl = document.getElementById('zip-date');
    if (dateEl) {
      let timestamp = dateEl.getAttribute('data-timestamp');
      if (timestamp) {
        let rawDate = new Date(timestamp);

        if (isNaN(rawDate.getTime())) {
          rawDate = new Date(timestamp.replace(/-/g, "/").replace(/[TZ]/g, " "));
        }

        if (!isNaN(rawDate.getTime())) {
          let isUk = window.location.pathname.indexOf('/uk/') !== -1;
          let locale = isUk ? 'uk-UA' : 'en-US';

          let options = {
            day: 'numeric',
            month: 'long',
            year: 'numeric'
          };

          let formattedDate = rawDate.toLocaleDateString(locale, options);
          dateEl.innerText = formattedDate.replace(/\s*р\.?$/, "");
        }
      }
    }
  });
</script>
